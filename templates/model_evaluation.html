{% extends "base.html" %}
{% block title %}Model Evaluation{% endblock %}

{% block content %}
<div class="container mt-3">
    <h2>Model Evaluation</h2>

    <!-- Search Form -->
    <form method="POST">
        <div class="row">
            <!-- Model Selection -->
            <div class="col-md-3">
                <div class="mb-3">
                    <label class="form-label" for="model">Model</label>
                    <select class="form-select" id="model" name="model">
                        {% for option in ["Linear Regression", "Random Forest", "XGBoost"] %}
                        <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Search Term -->
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label" for="search_term">Player Name:</label>
                    <input class="form-control" id="search_term" name="search_term" placeholder="e.g., Cole Palmer"
                           type="text">
                </div>
            </div>

            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary mb-3" type="submit">Search</button>
            </div>
        </div>
    </form>

    {% if search_results %}
    <div class="mt-4">
        <h3>Results</h3>
        {{ search_results|safe }}
    </div>
    {% endif %}
</div>
{% endblock %}
