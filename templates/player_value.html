{% extends "base.html" %}
{% block content %}
<div class="mt-3">
    <h2>Player Market Value Retrieval / Manual Input</h2>
    <p>Enter the player's name, team, and (if known) their Transfermarkt value. If the market value is missing from the
        dataset, you may input it manually here.</p>
    <form method="POST">
        <div class="form-group">
            <label for="player_name">Player Name:</label>
            <input class="form-control" id="player_name" name="player_name" placeholder="e.g., Miloš Veljković"
                   required type="text">
        </div>
        <div class="form-group">
            <label for="team_name">Team:</label>
            <input class="form-control" id="team_name" name="team_name" placeholder="e.g., SV Werder Bremen" required
                   type="text">
        </div>
        <div class="form-group">
            <label for="transfer_value">Transfermarkt Value:</label>
            <input class="form-control" id="transfer_value" name="transfer_value" placeholder="e.g., 4500000"
                   type="number">
        </div>
        <button class="btn btn-primary" type="submit">Submit Player Value</button>
    </form>
</div>
{% endblock %}
